name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Wait for tarball
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.version.outputs.version }}.tar.gz"
          for i in $(seq 1 12); do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$URL")
            [ "$STATUS" = "200" ] && echo "Tarball ready." && break
            echo "Waiting ($STATUS)… attempt $i/12" && sleep 10
          done

      - name: Compute sha256
        id: sha
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.version.outputs.version }}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL"    >> "$GITHUB_OUTPUT"

      - name: Build changelog
        id: changelog
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ steps.version.outputs.version }}$" | head -1)
          if [ -n "$PREV" ]; then
            git log --pretty="- %s" "${PREV}..${{ steps.version.outputs.version }}" \
              | grep -v '\[skip ci\]' | head -40 > /tmp/notes.txt
          else
            git log --pretty="- %s" --max-count=40 | grep -v '\[skip ci\]' > /tmp/notes.txt
          fi
          echo "notes_file=/tmp/notes.txt" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "forge ${{ steps.version.outputs.version }}" \
            --notes-file "${{ steps.changelog.outputs.notes_file }}" \
            --verify-tag

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          URL="${{ steps.sha.outputs.url }}"

          git clone \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Ddundee/homebrew-forge.git" \
            tap

          cd tap
          sed -i \
            -e "s|url \".*\"|url \"${URL}\"|" \
            -e "s|sha256 \".*\"|sha256 \"${SHA}\"|" \
            Formula/forgecli.rb

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/forgecli.rb
          git diff --cached --quiet \
            && echo "Formula already up to date." \
            || git commit -m "chore: update forge to ${VERSION}"
          git push

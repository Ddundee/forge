name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history + ability to push formula update back
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Wait for tarball to be available
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.version.outputs.version }}.tar.gz"
          for i in $(seq 1 12); do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Tarball available."
              break
            fi
            echo "Waiting for tarball ($STATUS)… attempt $i/12"
            sleep 10
          done

      - name: Compute sha256
        id: sha
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.version.outputs.version }}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          URL="${{ steps.sha.outputs.url }}"

          sed -i \
            -e "s|url \".*\"|url \"$URL\"|" \
            -e "s|sha256 \".*\"|sha256 \"$SHA\"|" \
            Formula/forge.rb

          echo "Updated Formula/forge.rb:"
          cat Formula/forge.rb

      - name: Commit and push formula update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout main
          git pull origin main

          # Re-apply the formula change on main (tag may be on a different commit)
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          URL="${{ steps.sha.outputs.url }}"

          sed -i \
            -e "s|url \".*\"|url \"$URL\"|" \
            -e "s|sha256 \".*\"|sha256 \"$SHA\"|" \
            Formula/forge.rb

          git add Formula/forge.rb
          git diff --cached --quiet && echo "Formula already up to date, skipping commit." || \
            git commit -m "chore: bump Homebrew formula to $VERSION [skip ci]"
          git push origin main

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Pull release notes from git log since previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ steps.version.outputs.version }}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty="- %s" "$PREV_TAG".."${{ steps.version.outputs.version }}" -- | grep -v '\[skip ci\]' | head -30)
          else
            NOTES=$(git log --pretty="- %s" --max-count=20 | grep -v '\[skip ci\]')
          fi
          # Write to file to handle multiline safely
          printf '%s' "$NOTES" > /tmp/release_notes.txt
          echo "notes_file=/tmp/release_notes.txt" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "forge $VERSION" \
            --notes-file "${{ steps.changelog.outputs.notes_file }}" \
            --verify-tag
